<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nossa História ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Montserrat;
background:#050a12;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow-x:hidden;
}

/* estrelas */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* layout */

.main{
max-width:700px;
width:92%;
text-align:center;
padding:40px 0;
}

h1{
font-family:"Playfair Display";
font-size:2.5rem;
margin-bottom:25px;
}

/* contador */

.contador{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
margin-bottom:30px;
}

.bloco{
background:rgba(255,255,255,.05);
padding:18px;
border-radius:14px;
min-width:75px;
border:1px solid rgba(100,255,218,.25);
}

.numero{
font-size:2rem;
font-weight:600;
color:#64ffda;
transition:.3s;
}

.label{
font-size:.65rem;
letter-spacing:2px;
opacity:.6;
}

/* carta */

.carta{
background:rgba(255,255,255,.03);
padding:30px;
border-radius:20px;
border:1px solid rgba(255,255,255,.08);
line-height:1.8;
text-align:left;
margin-bottom:35px;
min-height:140px;
}

/* galeria */

.galeria{
position:relative;
overflow:hidden;
border-radius:20px;
margin-bottom:35px;
}

.slides{
display:flex;
transition:transform .5s ease;
}

.slides img{
width:100%;
flex-shrink:0;
border-radius:20px;
cursor:pointer;
transition:transform .3s;
}

.slides img:hover{
transform:scale(1.02);
}

/* botões */

.btn{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,.5);
border:none;
color:white;
font-size:22px;
padding:8px 14px;
cursor:pointer;
border-radius:8px;
}

.prev{ left:10px }
.next{ right:10px }

/* zoom */

.zoom{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.zoom img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

/* player */

.player{
background:rgba(255,255,255,.04);
padding:20px;
border-radius:20px;
border:1px solid rgba(100,255,218,.2);
}

.player p{
margin-bottom:10px;
font-size:.8rem;
letter-spacing:2px;
color:#64ffda;
}

audio{
width:100%;
filter:invert(100%) hue-rotate(150deg);
}

/* coração */

@keyframes subir{
0%{transform:translateY(0);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-110vh);opacity:0;}
}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<div class="main">

<h1>Nossa História ❤️</h1>

<div class="contador">

<div class="bloco">
<div class="numero" id="dias">00</div>
<div class="label">Dias</div>
</div>

<div class="bloco">
<div class="numero" id="horas">00</div>
<div class="label">Horas</div>
</div>

<div class="bloco">
<div class="numero" id="minutos">00</div>
<div class="label">Min</div>
</div>

<div class="bloco">
<div class="numero" id="segundos">00</div>
<div class="label">Seg</div>
</div>

</div>

<div class="carta" id="carta"></div>

<div class="galeria">

<div class="slides" id="slides">

<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">

</div>

<button class="btn prev" onclick="voltar()">‹</button>
<button class="btn next" onclick="avancar()">›</button>

</div>

<div class="player">

<p>Nossa Música 🎵</p>

<audio controls>
<source src="musica.mp3" type="audio/mpeg">
</audio>

</div>

</div>

<script>

/* contador */

const inicio = new Date("2025-12-20T21:34:00").getTime()

function atualizar(){

const agora = new Date().getTime()
const diff = agora - inicio

const d = Math.floor(diff/(1000*60*60*24))
const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60))
const m = Math.floor((diff%(1000*60*60))/(1000*60))
const s = Math.floor((diff%(1000*60))/1000)

document.getElementById("dias").innerText = String(d).padStart(2,'0')
document.getElementById("horas").innerText = String(h).padStart(2,'0')
document.getElementById("minutos").innerText = String(m).padStart(2,'0')
document.getElementById("segundos").innerText = String(s).padStart(2,'0')

}

setInterval(atualizar,1000)

/* texto digitando */

const texto=`Meu amor,

Eu sei que isso é simples,
mas não queria deixar esse dia passar em branco.

Você é uma pessoa incrível
e eu amo cada detalhe seu.

Obrigado por estar comigo ❤️`

let i=0

function digitar(){

if(i<texto.length){

document.getElementById("carta").innerHTML+=texto.charAt(i)

i++

setTimeout(digitar,35)

}

}

digitar()

/* galeria */

let index=0
const slides=document.getElementById("slides")
const total=slides.children.length

function avancar(){

index++

if(index>=total) index=0

slides.style.transform=`translateX(-${index*100}%)`

coracao()

}

function voltar(){

index--

if(index<0) index=total-1

slides.style.transform=`translateX(-${index*100}%)`

coracao()

}

/* swipe */

let startX=0

slides.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

slides.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

if(startX-endX>50) avancar()
if(endX-startX>50) voltar()

})

/* zoom foto */

document.querySelectorAll(".slides img").forEach(img=>{

img.onclick=()=>{

const zoom=document.createElement("div")
zoom.className="zoom"

const imagem=document.createElement("img")
imagem.src=img.src

zoom.appendChild(imagem)

zoom.onclick=()=>zoom.remove()

document.body.appendChild(zoom)

}

})

/* estrelas */

const canvas=document.getElementById("stars")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<120;i++){

stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(s=>{

ctx.beginPath()
ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
ctx.fill()

s.y+=0.2

if(s.y>canvas.height){
s.y=0
}

})

requestAnimationFrame(draw)

}

draw()

/* corações */

function coracao(){

const c=document.createElement("div")

c.innerHTML="❤️"

c.style.position="fixed"
c.style.left=Math.random()*100+"vw"
c.style.bottom="-20px"
c.style.fontSize=Math.random()*20+10+"px"
c.style.animation="subir 6s linear"

document.body.appendChild(c)

setTimeout(()=>c.remove(),6000)

}

</script>

</body>
</html>
