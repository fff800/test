<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nossa História ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Montserrat;
background:#050a12;
color:white;
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-2;
}

.intro{
position:fixed;
width:100%;
height:100%;
background:#050a12;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:10;
}

.envelope{
width:180px;
height:120px;
background:#ff4d6d;
position:relative;
border-radius:8px;
cursor:pointer;
transition:.6s;
}

.envelope:before{
content:"";
position:absolute;
top:0;
left:0;
width:0;
height:0;
border-left:90px solid transparent;
border-right:90px solid transparent;
border-bottom:60px solid #ff758f;
}

.intro p{
margin-top:20px;
opacity:.8;
}

.hidden{
display:none;
}

.main{
max-width:750px;
width:92%;
margin:auto;
text-align:center;
padding:40px 0;
}

h1{
font-family:"Playfair Display";
font-size:2.6rem;
margin-bottom:25px;
}

.contador{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
margin-bottom:30px;
}

.bloco{
background:rgba(255,255,255,.05);
padding:18px;
border-radius:14px;
min-width:75px;
border:1px solid rgba(100,255,218,.25);
}

.numero{
font-size:2rem;
font-weight:600;
color:#64ffda;
}

.label{
font-size:.65rem;
letter-spacing:2px;
opacity:.6;
}

.carta{
background:rgba(255,255,255,.03);
padding:30px;
border-radius:20px;
border:1px solid rgba(255,255,255,.08);
line-height:1.8;
text-align:left;
margin-bottom:35px;
min-height:140px;
}

.galeria{
position:relative;
overflow:hidden;
border-radius:20px;
margin-bottom:35px;
}

.slides{
display:flex;
transition:transform .5s ease;
}

.slides img{
width:100%;
flex-shrink:0;
border-radius:20px;
cursor:pointer;
}

.btn{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,.5);
border:none;
color:white;
font-size:22px;
padding:8px 14px;
cursor:pointer;
border-radius:8px;
}

.prev{left:10px}
.next{right:10px}

.zoom{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:flex;
justify-content:center;
align-items:center;
z-index:99;
}

.zoom img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

.player{
background:rgba(255,255,255,.04);
padding:20px;
border-radius:20px;
border:1px solid rgba(100,255,218,.2);
margin-bottom:30px;
}

.player p{
margin-bottom:10px;
font-size:.8rem;
letter-spacing:2px;
color:#64ffda;
}

audio{
width:100%;
filter:invert(100%) hue-rotate(150deg);
}

@keyframes subir{
0%{transform:translateY(0);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-110vh);opacity:0;}
}

</style>
</head>

<body>

<div class="intro" id="intro">
<div class="envelope" onclick="abrir()"></div>
<p>Toque para abrir 💌</p>
</div>

<canvas id="stars"></canvas>

<div class="main">

<h1>Nossa História ❤️</h1>

<div class="contador">

<div class="bloco">
<div class="numero" id="dias">00</div>
<div class="label">Dias</div>
</div>

<div class="bloco">
<div class="numero" id="horas">00</div>
<div class="label">Horas</div>
</div>

<div class="bloco">
<div class="numero" id="minutos">00</div>
<div class="label">Min</div>
</div>

<div class="bloco">
<div class="numero" id="segundos">00</div>
<div class="label">Seg</div>
</div>

</div>

<div class="carta" id="carta"></div>

<div class="galeria">

<div class="slides" id="slides">

<img src="foto2.jpg">
<img src="foto1.jpg">
<img src="foto3.jpg">
<img src="foto4.jpg">
<img src="foto5.jpg">
<img src="foto6.jpg">
<img src="foto7.jpg">
<img src="foto8.jpg">
<img src="foto9.jpg">
<img src="foto10.jpg">

</div>

<button class="btn prev" onclick="voltar()">‹</button>
<button class="btn next" onclick="avancar()">›</button>

</div>

<!-- CAIXA DE MENSAGEM -->

<div class="player">

<p>💌 Deixe uma mensagem</p>

<input id="nomeMsg" placeholder="Seu nome"
style="width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:none;">

<textarea id="textoMsg" placeholder="Escreva sua mensagem..."
style="width:100%;padding:10px;height:100px;border-radius:8px;border:none;"></textarea>

<button onclick="enviarMensagem()" style="
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
cursor:pointer;">
Enviar ❤️
</button>

</div>

<div class="player">

<p>Nossa Música 🎵</p>

<audio controls>
<source src="musica.mp3">
</audio>

</div>

</div>

<script>

/* abrir envelope */

function abrir(){
document.getElementById("intro").classList.add("hidden")
}

/* contador */

const inicio = new Date("2025-12-20T21:34:00").getTime()

function atualizar(){

const agora=new Date().getTime()
const diff=agora-inicio

const d=Math.floor(diff/(1000*60*60*24))
const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60))
const m=Math.floor((diff%(1000*60*60))/(1000*60))
const s=Math.floor((diff%(1000*60))/1000)

document.getElementById("dias").innerText=d
document.getElementById("horas").innerText=h
document.getElementById("minutos").innerText=m
document.getElementById("segundos").innerText=s

}

setInterval(atualizar,1000)

/* texto digitando */

const texto=`Meu amor,

Eu sei que isso é algo simples,
mas não queria deixar esse dia passar em branco.

Você é a pessoa mais incrível que eu conheço
e eu amo cada detalhe seu.

Obrigado por existir na minha vida ❤️`

let i=0

function digitar(){

if(i<texto.length){

document.getElementById("carta").innerHTML+=texto.charAt(i)
i++

setTimeout(digitar,35)

}

}

digitar()

/* galeria */

let index=0
const slides=document.getElementById("slides")
const total=slides.children.length

function avancar(){
index++
if(index>=total) index=0
slides.style.transform=`translateX(-${index*100}%)`
coracao()
}

function voltar(){
index--
if(index<0) index=total-1
slides.style.transform=`translateX(-${index*100}%)`
coracao()
}

/* salvar mensagens */

function enviarMensagem(){

const nome=document.getElementById("nomeMsg").value
const texto=document.getElementById("textoMsg").value

if(!texto){
alert("Escreva uma mensagem")
return
}

let mensagens=JSON.parse(localStorage.getItem("mensagens") || "[]")

mensagens.push({
nome:nome || "Anônimo",
texto:texto,
data:new Date().toLocaleString()
})

localStorage.setItem("mensagens",JSON.stringify(mensagens))

alert("Mensagem enviada ❤️")

document.getElementById("textoMsg").value=""
document.getElementById("nomeMsg").value=""

}

</script>

</body>
</html>
