<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Duda ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:Montserrat;
  background:#050a12;
  color:white;
  overflow:hidden;
}

/* fundo estrelado */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* envelope de entrada */
#intro{
  position:fixed;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#050a12;
  z-index:10;
}
.envelope{
  width:180px;
  height:120px;
  background:#ff4d6d;
  position:relative;
  cursor:pointer;
  border-radius:8px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
}
.envelope:before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#ff758f;
  clip-path:polygon(0 0,100% 0,50% 60%);
  transition:.6s;
}
.envelope.open:before{
  transform:rotateX(180deg);
}
.intro p{
  margin-top:20px;
  opacity:.8;
}

/* site principal */
.main{
  max-width:750px;
  margin:auto;
  padding:40px 20px;
  display:none;
  text-align:center;
}
h1{
  font-family:"Playfair Display";
  font-size:2.6rem;
  margin-bottom:30px;
}

/* carta */
.carta{
  background:rgba(255,255,255,.03);
  padding:30px;
  border-radius:18px;
  line-height:1.8;
  text-align:left;
  margin-bottom:40px;
  min-height:150px;
}

/* galeria */
.galeria{
  position:relative;
  overflow:hidden;
  border-radius:20px;
  margin-bottom:40px;
}
.slides{
  display:flex;
  transition:transform .5s;
}
.slides img{
  width:100%;
  flex-shrink:0;
  border-radius:20px;
  cursor:pointer;
}
.btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,.5);
  border:none;
  color:white;
  font-size:22px;
  padding:8px 14px;
  cursor:pointer;
  border-radius:8px;
}
.prev{left:10px}
.next{right:10px}

/* zoom */
.zoom{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.9);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:20;
}
.zoom img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

/* player */
.player{
  background:rgba(255,255,255,.04);
  padding:20px;
  border-radius:18px;
}
audio{
  width:100%;
  filter:invert(100%);
}

/* corações */
@keyframes subir{
  0%{transform:translateY(0);opacity:0;}
  50%{opacity:1;}
  100%{transform:translateY(-110vh);opacity:0;}
}

/* mensagem secreta */
#mensagem{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(255,255,255,0.05);
  padding:40px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.2);
  text-align:center;
  z-index:30;
  font-size:1.2rem;
}

#estrelaE{
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:80px;
  color:#64ffda;
  cursor:pointer;
  z-index:5;
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<!-- envelope inicial -->
<div id="intro">
  <div class="envelope" onclick="abrir()">
    Abrir 💌
  </div>
</div>

<!-- site principal -->
<div class="main" id="site">
<h1>Nossa História ❤️</h1>

<div class="carta" id="carta"></div>

<div class="galeria">
  <div class="slides" id="slides">
    <img src="foto1.jpg">
    <img src="foto2.jpg">
    <img src="foto3.jpg">
  </div>
  <button class="btn prev" onclick="voltar()">‹</button>
  <button class="btn next" onclick="avancar()">›</button>
</div>

<div class="player">
<p>Nossa música 🎵</p>
<audio controls>
<source src="musica.mp3">
</audio>
</div>

<!-- estrela interativa E -->
<div id="estrelaE" onclick="mensagemSecreta()">E</div>

<div id="mensagem">
💌 Olá Duda! Esta é a mensagem secreta só pra você. Te amo muito! ❤️
</div>

</div>

<script>

/* abrir envelope */
function abrir(){
  document.querySelector(".envelope").classList.add("open")
  setTimeout(()=>{
    document.getElementById("intro").style.display="none"
    document.getElementById("site").style.display="block"
  },600)
}

/* texto digitando */
const texto=`Meu amor Duda,

Eu fiz esse site para lembrar cada momento que vivemos juntos.

Obrigado por ser incrível e existir na minha vida ❤️`
let i=0
function digitar(){
  if(i<texto.length){
    document.getElementById("carta").innerHTML+=texto.charAt(i)
    i++
    setTimeout(digitar,35)
  }
}
digitar()

/* galeria */
let index=0
const slides=document.getElementById("slides")
function avancar(){index++; if(index>2) index=0; slides.style.transform=`translateX(-${index*100}%)`}
function voltar(){index--; if(index<0) index=2; slides.style.transform=`translateX(-${index*100}%)`}

/* zoom */
document.querySelectorAll(".slides img").forEach(img=>{
  img.onclick=()=>{
    const zoom=document.createElement("div")
    zoom.className="zoom"
    const imagem=document.createElement("img")
    imagem.src=img.src
    zoom.appendChild(imagem)
    zoom.onclick=()=>zoom.remove()
    document.body.appendChild(zoom)
  }
})

/* estrelas animadas */
const canvas=document.getElementById("stars")
const ctx=canvas.getContext("2d")
canvas.width=window.innerWidth
canvas.height=window.innerHeight
let stars=[]
for(let i=0;i<150;i++){
  stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.5})
}
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height)
  ctx.fillStyle="white"
  stars.forEach(s=>{
    ctx.beginPath()
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
    ctx.fill()
    s.y+=0.2
    if(s.y>canvas.height) s.y=0
  })
  requestAnimationFrame(draw)
}
draw()

/* corações flutuantes */
setInterval(()=>{
  const c=document.createElement("div")
  c.innerHTML="❤️"
  c.style.position="fixed"
  c.style.left=Math.random()*100+"vw"
  c.style.bottom="-20px"
  c.style.fontSize=Math.random()*20+10+"px"
  c.style.animation="subir 6s linear"
  document.body.appendChild(c)
  setTimeout(()=>c.remove(),6000)
},800)

/* mensagem secreta */
function mensagemSecreta(){
  const m=document.getElementById("mensagem")
  m.style.display="block"
}

</script>
</body>
</html>
