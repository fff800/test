<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nossa História ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Montserrat;
background:#050a12;
color:white;
overflow-x:hidden;
}

/* fundo estrelas */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* tela envelope */

#intro{
position:fixed;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050a12;
z-index:10;
}

.envelope{
width:200px;
height:130px;
background:#ff4d6d;
position:relative;
cursor:pointer;
border-radius:6px;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
}

.envelope:before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#ff758f;
clip-path:polygon(0 0,100% 0,50% 60%);
transition:.6s;
}

.envelope.open:before{
transform:rotateX(180deg);
}

/* site principal */

.main{
max-width:750px;
margin:auto;
padding:40px 20px;
display:none;
text-align:center;
}

h1{
font-family:"Playfair Display";
font-size:2.6rem;
margin-bottom:30px;
}

/* contador */

.contador{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:35px;
}

.box{
background:rgba(255,255,255,.05);
padding:18px;
border-radius:14px;
min-width:80px;
border:1px solid rgba(255,255,255,.1);
}

.numero{
font-size:2rem;
color:#64ffda;
font-weight:600;
}

.label{
font-size:.65rem;
letter-spacing:2px;
opacity:.7;
}

/* carta */

.carta{
background:rgba(255,255,255,.03);
padding:30px;
border-radius:18px;
line-height:1.8;
text-align:left;
margin-bottom:40px;
min-height:150px;
}

/* galeria */

.galeria{
position:relative;
overflow:hidden;
border-radius:20px;
margin-bottom:40px;
}

.slides{
display:flex;
transition:transform .5s;
}

.slides img{
width:100%;
flex-shrink:0;
border-radius:20px;
cursor:pointer;
}

.btn{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,.5);
border:none;
color:white;
font-size:22px;
padding:8px 14px;
cursor:pointer;
border-radius:8px;
}

.prev{left:10px}
.next{right:10px}

/* zoom */

.zoom{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:flex;
justify-content:center;
align-items:center;
z-index:20;
}

.zoom img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

/* player */

.player{
background:rgba(255,255,255,.04);
padding:20px;
border-radius:18px;
}

audio{
width:100%;
filter:invert(100%);
}

/* corações */

@keyframes subir{

0%{
transform:translateY(0);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:translateY(-110vh);
opacity:0;
}

}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<!-- intro -->

<div id="intro">

<div class="envelope" onclick="abrir()">
Abrir ❤️
</div>

</div>

<!-- site -->

<div class="main" id="site">

<h1>Nossa História ❤️</h1>

<div class="contador">

<div class="box">
<div class="numero" id="dias">00</div>
<div class="label">Dias</div>
</div>

<div class="box">
<div class="numero" id="horas">00</div>
<div class="label">Horas</div>
</div>

<div class="box">
<div class="numero" id="minutos">00</div>
<div class="label">Min</div>
</div>

<div class="box">
<div class="numero" id="segundos">00</div>
<div class="label">Seg</div>
</div>

</div>

<div class="carta" id="carta"></div>

<div class="galeria">

<div class="slides" id="slides">

<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">

</div>

<button class="btn prev" onclick="voltar()">‹</button>
<button class="btn next" onclick="avancar()">›</button>

</div>

<div class="player">

<p>Nossa música 🎵</p>

<audio controls>
<source src="musica.mp3">
</audio>

</div>

</div>

<script>

/* abrir envelope */

function abrir(){

document.querySelector(".envelope").classList.add("open")

setTimeout(()=>{

document.getElementById("intro").style.display="none"
document.getElementById("site").style.display="block"

},600)

}

/* contador */

const inicio=new Date("2025-12-20T21:34:00").getTime()

function atualizar(){

const agora=new Date().getTime()

const diff=agora-inicio

const d=Math.floor(diff/(1000*60*60*24))
const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60))
const m=Math.floor((diff%(1000*60*60))/(1000*60))
const s=Math.floor((diff%(1000*60))/1000)

dias.innerText=d
horas.innerText=h
minutos.innerText=m
segundos.innerText=s

}

setInterval(atualizar,1000)

/* texto digitando */

const texto=`Meu amor,

Eu fiz esse pequeno site para lembrar
de cada momento que vivemos juntos.

Cada dia ao seu lado
é um dos melhores capítulos da minha vida.

Obrigado por existir ❤️`

let i=0

function digitar(){

if(i<texto.length){

carta.innerHTML+=texto.charAt(i)

i++

setTimeout(digitar,35)

}

}

digitar()

/* galeria */

let index=0
const slides=document.getElementById("slides")

function avancar(){

index++

if(index>2) index=0

slides.style.transform=`translateX(-${index*100}%)`

}

function voltar(){

index--

if(index<0) index=2

slides.style.transform=`translateX(-${index*100}%)`

}

/* zoom */

document.querySelectorAll(".slides img").forEach(img=>{

img.onclick=()=>{

const zoom=document.createElement("div")
zoom.className="zoom"

const imagem=document.createElement("img")
imagem.src=img.src

zoom.appendChild(imagem)

zoom.onclick=()=>zoom.remove()

document.body.appendChild(zoom)

}

})

/* estrelas */

const canvas=document.getElementById("stars")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<120;i++){

stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(s=>{

ctx.beginPath()
ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
ctx.fill()

s.y+=0.2

if(s.y>canvas.height){
s.y=0
}

})

requestAnimationFrame(draw)

}

draw()

/* corações infinitos */

setInterval(()=>{

const c=document.createElement("div")

c.innerHTML="❤️"

c.style.position="fixed"
c.style.left=Math.random()*100+"vw"
c.style.bottom="-20px"
c.style.fontSize=Math.random()*20+10+"px"
c.style.animation="subir 6s linear"

document.body.appendChild(c)

setTimeout(()=>c.remove(),6000)

},800)

</script>

</body>
</html>
